<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Summit 2026 | Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Tech Summit 2026</h1>
            <p>One Day, Six Talks, Unlimited Inspiration</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="category-search" placeholder="Search by category (e.g. Frontend, AI, Security)...">
        </section>

        <section id="schedule-container" class="schedule-list">
            <!-- Schedule items will be injected here by app.js -->
            <div class="loading">Loading schedule...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tech Summit. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
